on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

name: test-coverage

permissions:
  contents: read
  pull-requests: write

jobs:
  test-coverage:
    runs-on: macOS-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Install dependencies
        run: |
          install.packages("pak")
          pak::pkg_install(".", dependencies = TRUE)
          pak::pkg_install("covr")
        shell: Rscript {0}

      - name: Test coverage
        run: covr::codecov()
        shell: Rscript {0}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}